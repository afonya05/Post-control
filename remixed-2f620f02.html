<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Контент-план</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f4f8;--surface:#fff;--surface2:#eef0f5;--border:#dde0ea;
  --accent:#2a5bff;--accent2:#7c3fff;--text:#1a1c2e;--sub:#5a5d78;--muted:#9a9db8;
  --success:#14a860;--warn:#d97700;--danger:#e03050;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-size:14px;-webkit-text-size-adjust:100%;}

.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;gap:10px;}
.logo{font-family:'Unbounded',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--accent);white-space:nowrap;cursor:pointer;border-bottom:1px dashed var(--accent);padding-bottom:1px;}
.h-title{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--text);flex:1;text-align:center;}
.h-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:'Onest',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}

.month-nav{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.month-label{font-family:'Unbounded',sans-serif;font-size:13px;flex:1;text-align:center;}
.stats-row{display:flex;gap:14px;flex-wrap:wrap;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.stat-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);}
.stat-chip b{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--text);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.done{background:var(--success);}.dot.wip{background:var(--warn);}.dot.all{background:var(--muted);}

.calendar-wrap{padding:10px 8px;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.wd{text-align:center;font-size:10px;font-family:'Unbounded',sans-serif;letter-spacing:.04em;color:var(--muted);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}

.day-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:88px;padding:7px 5px 6px;display:flex;flex-direction:column;gap:4px;}
@media(min-width:600px){.day-cell{min-height:120px;padding:10px;gap:5px;}}
.day-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.day-cell.empty-day{background:transparent;border-color:transparent;}
.day-num{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--muted);line-height:1;}
.today .day-num{color:var(--accent);}

.post-mini{background:var(--surface2);border-radius:5px;padding:4px 5px;font-size:11px;line-height:1.3;border-left:3px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.post-mini.pub{border-left-color:var(--success);}.post-mini.wip{border-left-color:var(--warn);}
.pm-type{font-size:9px;font-family:'Unbounded',sans-serif;letter-spacing:.02em;text-transform:uppercase;}
.pm-title{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-btn{margin-top:auto;background:none;border:1px dashed var(--border);color:var(--muted);border-radius:6px;width:100%;padding:3px;font-size:16px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent;}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,28,46,.35);z-index:500;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.overlay{align-items:center;padding:16px;}}
.overlay.open{display:flex;}

.modal{background:var(--surface);width:100%;max-width:540px;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:20px 20px 0 0;padding:20px 18px 36px;display:flex;flex-direction:column;gap:16px;animation:sheetUp .2s ease;}
@media(min-width:600px){.modal{border-radius:18px;padding:26px;}}
@keyframes sheetUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:none;}}
.drag-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto -8px;flex-shrink:0;}
@media(min-width:600px){.drag-handle{display:none;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Unbounded',sans-serif;font-size:13px;color:var(--accent);}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--sub);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}

.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:10px;font-family:'Unbounded',sans-serif;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.field input,.field select,.field textarea{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-family:'Onest',sans-serif;font-size:14px;outline:none;transition:border-color .12s;width:100%;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.status-row{display:flex;gap:8px;}
.s-btn{flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--sub);font-family:'Onest',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.s-btn.on-wip{background:#fff8ec;border-color:var(--warn);color:var(--warn);}
.s-btn.on-pub{background:#edfcf4;border-color:var(--success);color:var(--success);}

.upload-zone{background:var(--surface2);border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;position:relative;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-hint{color:var(--muted);font-size:12px;pointer-events:none;}
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .rm{position:absolute;top:2px;right:2px;background:rgba(26,28,46,.75);border:none;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}

.link-row{display:flex;gap:8px;align-items:center;}
.link-row input{flex:1;}
.link-row button{background:var(--accent2);color:#fff;border:none;border-radius:10px;padding:0 16px;height:44px;font-family:'Onest',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:12px;}
.chip a{color:var(--accent2);text-decoration:none;}
.chip .rml{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1;}

.save-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-family:'Unbounded',sans-serif;font-size:12px;letter-spacing:.04em;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.show-del-btn{background:none;border:1.5px solid #f8c8d0;color:var(--danger);border-radius:12px;padding:11px;width:100%;font-family:'Onest',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent;}
.del-panel{background:#fff4f6;border:1.5px solid #ffd0da;border-radius:12px;padding:14px 16px;display:none;flex-direction:column;gap:10px;}
.del-panel.show{display:flex;}
.del-panel p{font-size:13px;color:var(--danger);font-weight:500;text-align:center;}
.del-row{display:flex;gap:8px;}
.del-yes{background:var(--danger);color:#fff;border:none;border-radius:10px;padding:12px;flex:1;font-family:'Onest',sans-serif;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.del-no{background:var(--surface2);color:var(--sub);border:1.5px solid var(--border);border-radius:10px;padding:12px;flex:1;font-family:'Onest',sans-serif;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<header class="header">
  <div class="logo" id="logoName" onclick="openNameEdit()">ОЛЕГЖАН</div>
  <div class="h-title">Контент-план</div>
  <button class="h-add" onclick="openNew()">+ Пост</button>
</header>

<div class="month-nav">
  <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="nav-btn" onclick="changeMonth(1)">›</button>
</div>
<div class="stats-row" id="statsRow"></div>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="wd">ПН</div><div class="wd">ВТ</div><div class="wd">СР</div>
    <div class="wd">ЧТ</div><div class="wd">ПТ</div><div class="wd">СБ</div><div class="wd">ВС</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- NAME EDIT MODAL -->
<div class="overlay" id="nameOverlay" onclick="nameOverlayClick(event)">
  <div class="modal" style="gap:14px;">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <div class="modal-title">Название проекта</div>
      <button class="modal-close" onclick="closeNameEdit()">✕</button>
    </div>
    <div class="field">
      <label>Имя / Проект</label>
      <input type="text" id="fProjName" placeholder="Введите название..." maxlength="40">
    </div>
    <button class="save-btn" onclick="saveProjName()">Сохранить</button>
  </div>
</div>

<!-- POST MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="mTitle">Новый пост</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="row2">
      <div class="field">
        <label>Тип контента</label>
        <select id="fType">
          <option value="Reels">🎬 Reels</option>
          <option value="Пост">📸 Пост</option>
          <option value="Карусель">🎠 Карусель</option>
          <option value="Сторис">📱 Сторис</option>
          <option value="Клип">🎥 Клип</option>
        </select>
      </div>
      <div class="field">
        <label>Дата</label>
        <input type="date" id="fDate">
      </div>
    </div>
    <div class="field">
      <label>Тема контента</label>
      <input type="text" id="fTitle" placeholder="Кейс / Совет / Акция...">
    </div>
    <div class="field">
      <label>Описание / Бриф</label>
      <textarea id="fDesc" placeholder="Ключевые тезисы, текст, детали..."></textarea>
    </div>
    <div class="field">
      <label>Статус публикации</label>
      <div class="status-row">
        <button class="s-btn" id="btnWip" onclick="setStatus('wip')">✏️ В работе</button>
        <button class="s-btn" id="btnPub" onclick="setStatus('pub')">✅ Опубликовано</button>
      </div>
    </div>
    <div class="field">
      <label>Референсы — изображения</label>
      <div class="upload-zone">
        <input type="file" id="fImg" accept="image/*" multiple onchange="handleImgs(event)">
        <div class="upload-hint">📎 Нажмите или перетащите изображения</div>
      </div>
      <div class="img-grid" id="imgGrid"></div>
    </div>
    <div class="field">
      <label>Референсы — ссылки</label>
      <div class="link-row">
        <input type="text" id="fLink" placeholder="Ссылка, @аккаунт, заметка...">
        <button onclick="addLink()">+ Добавить</button>
      </div>
      <div class="chips" id="chips"></div>
    </div>
    <button class="save-btn" onclick="savePost()">Сохранить пост</button>
    <button class="show-del-btn" id="showDelBtn" onclick="toggleDel()">🗑 Удалить этот пост</button>
    <div class="del-panel" id="delPanel">
      <p>Удалить пост безвозвратно?</p>
      <div class="del-row">
        <button class="del-yes" onclick="deletePost()">Да, удалить</button>
        <button class="del-no" onclick="toggleDel()">Отмена</button>
      </div>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const TC = {Reels:'#c026d3',Пост:'#2a5bff',Карусель:'#16a860',Сторис:'#d97700',Клип:'#e03050'};

let yr = new Date().getFullYear();
let mo = new Date().getMonth();
let posts = [];
try { posts = JSON.parse(localStorage.getItem('wb_posts2') || '[]'); } catch {}

let editId = null, imgs = [], links = [], st = 'wip';

// --- Project name ---
let projName = localStorage.getItem('wb_projname') || 'ОЛЕГЖАН';
document.getElementById('logoName').textContent = projName;

function openNameEdit() {
  document.getElementById('fProjName').value = projName;
  document.getElementById('nameOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fProjName').focus(), 150);
}
function closeNameEdit() { document.getElementById('nameOverlay').classList.remove('open'); }
function nameOverlayClick(e) { if (e.target === document.getElementById('nameOverlay')) closeNameEdit(); }
function saveProjName() {
  const v = document.getElementById('fProjName').value.trim();
  if (!v) return;
  projName = v.toUpperCase();
  document.getElementById('logoName').textContent = projName;
  localStorage.setItem('wb_projname', projName);
  closeNameEdit();
}

// --- Posts ---
function savePosts() { try { localStorage.setItem('wb_posts2', JSON.stringify(posts)); } catch {} }

function render() {
  document.getElementById('monthLabel').textContent = `${MONTHS[mo]} ${yr}`;
  const inM = posts.filter(p => { const d = new Date(p.date); return d.getFullYear() === yr && d.getMonth() === mo; });
  const pub = inM.filter(p => p.status === 'pub').length;
  const wip = inM.filter(p => p.status === 'wip').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><div class="dot done"></div><b>${pub}</b>&nbsp;опубликовано</div>
    <div class="stat-chip"><div class="dot wip"></div><b>${wip}</b>&nbsp;в работе</div>
    <div class="stat-chip"><div class="dot all"></div><b>${inM.length}</b>&nbsp;всего</div>`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today = new Date();
  let dow = new Date(yr, mo, 1).getDay();
  dow = dow === 0 ? 6 : dow - 1;
  const days = new Date(yr, mo + 1, 0).getDate();

  for (let i = 0; i < dow; i++) {
    const e = document.createElement('div'); e.className = 'day-cell empty-day'; grid.appendChild(e);
  }
  for (let d = 1; d <= days; d++) {
    const isT = today.getDate() === d && today.getMonth() === mo && today.getFullYear() === yr;
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isT ? ' today' : '');
    cell.innerHTML = `<div class="day-num">${d}</div>`;

    posts.filter(p => p.date === ds).forEach(p => {
      const col = TC[p.type] || '#888';
      const pm = document.createElement('div');
      pm.className = 'post-mini ' + (p.status === 'pub' ? 'pub' : 'wip');
      pm.innerHTML = `<div class="pm-type" style="color:${col}">${p.type}</div><div class="pm-title">${p.title || '(без темы)'}</div>`;
      pm.onclick = e => { e.stopPropagation(); openEdit(p.id); };
      cell.appendChild(pm);
    });

    const ab = document.createElement('button');
    ab.className = 'add-btn'; ab.textContent = '+';
    ab.onclick = e => { e.stopPropagation(); openNew(ds); };
    cell.appendChild(ab);
    grid.appendChild(cell);
  }
}

function changeMonth(d) { mo += d; if (mo < 0) { mo = 11; yr--; } if (mo > 11) { mo = 0; yr++; } render(); }

function openNew(ds) {
  editId = null; imgs = []; links = []; resetForm();
  if (ds) document.getElementById('fDate').value = ds;
  document.getElementById('mTitle').textContent = 'Новый пост';
  document.getElementById('showDelBtn').style.display = 'none';
  document.getElementById('delPanel').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id) {
  const p = posts.find(x => x.id === id); if (!p) return;
  editId = id; imgs = [...(p.images || [])]; links = [...(p.links || [])];
  document.getElementById('fType').value = p.type;
  document.getElementById('fDate').value = p.date;
  document.getElementById('fTitle').value = p.title;
  document.getElementById('fDesc').value = p.desc || '';
  setStatus(p.status || 'wip');
  renderImgs(); renderChips();
  document.getElementById('mTitle').textContent = 'Редактировать пост';
  document.getElementById('showDelBtn').style.display = 'block';
  document.getElementById('delPanel').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function resetForm() {
  document.getElementById('fType').value = 'Reels';
  document.getElementById('fDate').value = '';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  setStatus('wip');
  document.getElementById('imgGrid').innerHTML = '';
  document.getElementById('chips').innerHTML = '';
  document.getElementById('fLink').value = '';
  document.getElementById('fImg').value = '';
}
function setStatus(s) {
  st = s;
  document.getElementById('btnWip').className = 's-btn' + (s === 'wip' ? ' on-wip' : '');
  document.getElementById('btnPub').className = 's-btn' + (s === 'pub' ? ' on-pub' : '');
}
function handleImgs(e) {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => { imgs.push({ dataUrl: ev.target.result, name: f.name }); renderImgs(); };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}
function renderImgs() {
  const w = document.getElementById('imgGrid'); w.innerHTML = '';
  imgs.forEach((img, i) => {
    const t = document.createElement('div'); t.className = 'thumb';
    t.innerHTML = `<img src="${img.dataUrl}"><button class="rm" onclick="rmImg(${i})">✕</button>`;
    w.appendChild(t);
  });
}
function rmImg(i) { imgs.splice(i, 1); renderImgs(); }
function addLink() {
  let v = document.getElementById('fLink').value.trim(); if (!v) return;
  links.push(v); document.getElementById('fLink').value = ''; renderChips();
}
function renderChips() {
  const w = document.getElementById('chips'); w.innerHTML = '';
  links.forEach((l, i) => {
    const c = document.createElement('div'); c.className = 'chip';
    const isUrl = /^https?:\/\//.test(l);
    const label = isUrl ? (() => { try { return new URL(l).hostname.replace('www.',''); } catch { return l.slice(0,28); } })() : l.slice(0,36);
    const inner = isUrl ? `<a href="${l}" target="_blank">🔗 ${label}</a>` : `<span style="color:var(--sub)">📎 ${label}</span>`;
    c.innerHTML = `${inner}<button class="rml" onclick="rmLink(${i})">✕</button>`;
    w.appendChild(c);
  });
}
function rmLink(i) { links.splice(i, 1); renderChips(); }
function savePost() {
  const date = document.getElementById('fDate').value;
  if (!date) { alert('Укажите дату'); return; }
  const post = {
    id: editId || Date.now().toString(36),
    type: document.getElementById('fType').value,
    date,
    title: document.getElementById('fTitle').value.trim() || '(без темы)',
    desc: document.getElementById('fDesc').value,
    status: st, images: [...imgs], links: [...links]
  };
  if (editId) { const i = posts.findIndex(p => p.id === editId); if (i > -1) posts[i] = post; }
  else posts.push(post);
  savePosts(); closeModal(); render();
}
function toggleDel() { document.getElementById('delPanel').classList.toggle('show'); }
function deletePost() {
  if (!editId) return;
  posts = posts.filter(p => p.id !== editId);
  editId = null; savePosts(); closeModal(); render();
}

render();
</script>
</body>
</html>
